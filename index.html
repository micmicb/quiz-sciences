<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Sciences V58</title>

<style>
body{font-family:Arial;margin:0;padding:10px;background:#f4f4f4}
.image-zone{display:flex;flex-direction:column;align-items:center}
.image-zone img{max-height:30vh;object-fit:contain;margin-bottom:10px}
.question{background:white;padding:10px;border-radius:10px;width:100%}
button{padding:10px;margin:5px;font-size:16px;border-radius:8px;border:none;background:#1565c0;color:white}
</style>
</head>

<body>

<h1>Quiz Sciences – V58 ✅</h1>

<div class="image-zone">
<img src="" alt="">
<div class="question">La question s'affiche toujours ici ✅</div>
</div>

<div id="leaderboard"></div>

<script>
function htmlLeaderboard(){
let data = JSON.parse(localStorage.getItem("quiz_sciences_resultats_locaux_v57")||"[]");

data = data.filter(r=>r.action==="fin");

if(!data.length){
return "<b>Aucun score</b>";
}

data.sort((a,b)=>b.score-a.score);

let top=[];
let seen=new Set();

for(let r of data){
let key=r.nom+"|"+r.classe;
if(!seen.has(key)){
seen.add(key);
top.push(r);
}
if(top.length>=5) break;
}

let html="<h2>🏆 Top 5</h2>";

 top.forEach((r,i)=>{
html+= (i+1)+". "+r.nom+" ("+r.classe+") : "+r.score+"<br>";
});

return html;
}

document.getElementById("leaderboard").innerHTML = htmlLeaderboard();
</script>

</body>
</html>
